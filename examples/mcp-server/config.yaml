server:
  name: "goagent-mcp-demo"
  version: "0.1.0"

transport:
  type: stdio
  # for sse:
  # endpoint: ":8080"

tools:
  - name: calculator
    description: "Perform basic arithmetic operations"
    parameters:
      - name: operation
        type: string
        description: "One of: add, subtract, multiply, divide"
        required: true
      - name: a
        type: number
        required: true
      - name: b
        type: number
        required: true
  - name: echo
    description: "Echo back the input message"
    parameters:
      - name: message
        type: string
        required: true

resources:
  - uri: "config://settings"
    name: "Server Settings"
    description: "Current server configuration"

resource_templates:
  - uri_template: "file://{path}"
    name: "File Access"
    description: "Read file contents by path"

prompts:
  - name: summarize
    description: "Generate a summary prompt"
    arguments:
      - name: topic
        description: "Topic to summarize"
        required: true
