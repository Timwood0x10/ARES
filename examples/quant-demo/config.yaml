# GoAgentX Quantitative Multi-Agent Demo Configuration
# Connects to Ollama for LLM analysis; uses built-in compute for factor data.
# Uses mcp-null as a placeholder MCP server (satisfies startup requirement).

server:
  host: "localhost"
  port: 8091

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "llama3.2"
  timeout: 120

mcp:
  servers:
    - name: null
      enabled: true
      auto_start: true
      timeout: 30
      transport:
        type: stdio
        stdio:
          command: mcp-null
          args: ["serve"]

dashboard:
  addr: ":8091"
  ws_ping_interval: 30
