# 05-evolution-demo configuration
llm:
  provider: ollama
  model: llama3.2

memory:
  enabled: false
  # When enabled, the fields below tune the memory subsystem; left at zero
  # they fall back to component defaults. See examples/12-yaml-driven-flags.
  # max_history: 0
  # max_sessions: 0
  # enable_distillation: false
  # distillation_threshold: 0  # 0 = ungated (fire every event); N = gate every N rounds

tools:
  builtin: false

reflection:
  enabled: false

# GA evolution configuration
# All fields have defaults — only set what you need to override.
evolution:
  enabled: true                     # Enable the evolution pipeline
  population_size: 20               # Agents per generation
  elite_count: 2                    # Top agents preserved unchanged
  survival_rate: 0.6                # Fraction surviving selection [0, 1]
  mutation_rate: 0.2                # Gene mutation probability [0, 1]
  min_mutation_rate: 0.05           # Adaptive mutation rate floor
  max_mutation_rate: 0.5            # Adaptive mutation rate ceiling
  generations: 15                   # Max generations (0 = unlimited)
  breeding_pool_ratio: 0.5          # Crossover parent pool fraction
  min_interval: "5m"                # Scheduler minimum interval
  selection_strategy: "tournament"  # tournament/rank/roulette/sus/truncation/random
  tournament_size: 3                # Tournament competitors (only for tournament)
  crossover_type: "uniform"         # uniform/two_point/segment
  target_fitness: 0                 # Stop when best fitness >= target (0 = no target)
  steady_state: false               # Steady-state GA mode
  steady_state_replace_rate: 0.3    # Replacement fraction in steady-state mode
  # LLM-backed strategy scorer (opt-in, disabled by default).
  # When enabled, the GA scores each strategy via an LLM call instead of the
  # constant baseline (50.0). Requires a working LLM client (llm.* above).
  # The deterministic heuristic is used as fallback when the budget is
  # exhausted or the LLM call fails.
  # llm_scoring:
  #   enabled: true                    # Opt in to LLM-backed scoring
  #   seed: 42                         # >0 forces deterministic scoring
  #   max_calls_per_generation: 100    # Cap LLM API cost per generation
