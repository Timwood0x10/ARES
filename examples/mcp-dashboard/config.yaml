# MCP Dashboard Demo Configuration
# Connects to local codegraph MCP server + Ollama for LLM analysis

server:
  host: "localhost"
  port: 8090

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "llama3.2"
  timeout: 120

mcp:
  servers:
    - name: codegraph
      enabled: true
      auto_start: true
      timeout: 30
      transport:
        type: stdio
        stdio:
          command: codegraph
          args: ["serve", "--mcp"]

dashboard:
  addr: ":8090"
  ws_ping_interval: 30
