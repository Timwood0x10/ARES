# Arena Scenario: Research PM Failover
# Tests: project manager failover during research coordination
name: quant-research-pm-failover
description: |
  Kill the project manager (coordinator) during active research
  analysis. Verify that the system elects a new coordinator and
  research agents re-connect without losing state.
tags: [quant, research, pm, failover, leader]

config:
  stop_on_error: true
  warmup: 3s
  cooldown: 10s
  timeout: 2m

actions:
  # Phase 1: Let research agents start their work
  - delay: 0s
    action:
      type: slow_agent
      target_id: ""
      metadata:
        duration: 3s
    label: phase1-let-research-start
    expect_success: true
    depends_on: []

  # Phase 2: Kill the PM/leader during active work
  - delay: 4s
    action:
      type: kill_leader
    label: phase2-kill-pm-mid-research
    expect_success: true
    depends_on: [phase1-let-research-start]

  # Phase 3: Observation window for election + reconnection
  - delay: 8s
    action:
      type: kill_agent
      target_id: "research-analyst"
    label: phase3-verify-new-leader-controls-research
    expect_success: true
    depends_on: [phase2-kill-pm-mid-research]

  # Phase 4: Stress test under degraded conditions
  - delay: 5s
    action:
      type: slow_agent
      target_id: ""
      metadata:
        duration: 5s
    label: phase4-slow-under-degraded-leader
    expect_success: true
    depends_on: [phase3-verify-new-leader-controls-research]
