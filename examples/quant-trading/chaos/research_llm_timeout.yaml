# Arena Scenario: Research Layer LLM Timeout
# Tests: research agent resilience to LLM timeout failures
name: quant-research-llm-timeout
description: |
  Inject LLM timeout faults into the research layer during analysis.
  Verifies that the research agent handles timeouts gracefully and
  can recover or failover to alternative analysis paths.
tags: [quant, research, llm, timeout, chaos]

config:
  stop_on_error: false
  warmup: 2s
  cooldown: 5s
  timeout: 1m

actions:
  - delay: 0s
    action:
      type: llm_failure
      metadata:
        failure_type: "timeout"
        target_agent: "research-analyst"
        duration_ms: 30000
    label: inject-llm-timeout
    expect_success: true
    depends_on: []

  - delay: 5s
    action:
      type: kill_agent
      target_id: "research-analyst"
    label: verify-research-recovers
    expect_success: true
    depends_on: [inject-llm-timeout]
