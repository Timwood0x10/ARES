# ares Quantitative Trading Demo — configuration template.
# Copy to config.yml and fill in your API key:
#   cp config.example.yml config.yml
#   # Edit config.yml, uncomment the LLM configuration you want to use

server:
  host: "localhost"
  port: 8092

# ── Select LLM configuration (uncomment one group, keep others commented) ──

# ── Ollama (local, default) ──
llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "llama3.2"
  api_key: ""
  timeout: 120

# llm:
#   provider: "openai"
#   base_url: "https://api.openai.com/v1"
#   model: "MODEL_NAME"  # e.g. "gpt-5.5"
#   api_key: "YOUR_API_KEY"
#   timeout: 120

mcp:
  servers:
    - name: null
      enabled: true
      auto_start: true
      timeout: 30
      transport:
        type: stdio
        stdio:
          command: mcp-null
          args: ["serve"]

dashboard:
  addr: ":8092"
  ws_ping_interval: 30

# Research Layer Configuration (optional)
research:
  enabled: true
  selected_analysts:
    - market
    - sentiment
    - news
    - fundamentals
  max_debate_rounds: 2
  max_risk_rounds: 1
  quick_model: "gpt-4o-mini"
  deep_model: "gpt-4o"
  output_language: "english"
  data_vendors:
    - yahoo
  checkpoint_enabled: true
  memory_enabled: true

dataflow:
  max_stale_duration: "120h"
  holiday_grace_period: "72h"
