# Finetune Example Configuration
# Strategy evolution with LLM-based scoring
# Uses "openrouter" provider for any OpenAI-compatible API (Sensenova, OpenAI, etc.)

llm:
  provider: "openrouter"
  api_key: "sk-hyOasqzOhwaAhrs2Rv7REBzwuchXXdbv"
  model: "sensenova-6.7-flash-lite"
  base_url: "https://token.sensenova.cn/v1/"
  temperature: 0.3
  max_tokens: 500
  timeout: 30                  # seconds (yaml key must match struct tag: "timeout", not "timeout_seconds")
  scorer_api_rate: 10          # LLM scorer: requests per second
  scorer_api_burst: 20         # LLM scorer: burst size
  fallbacks:
    - provider: "openrouter"
      api_key: "sk-hyOasqzOhwaAhrs2Rv7REBzwuchXXdbv"
      model: "sensenova-u1-fast"
      base_url: "https://token.sensenova.cn/v1/"
      temperature: 0.3
      max_tokens: 500
      timeout: 30
