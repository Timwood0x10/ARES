# Autonomous Evolution Demo Configuration
#
# This config controls the GA evolution scenarios (6 & 7).
# Scenarios 1-5 (core building blocks) always run and require no configuration.
evolution:
  enabled: true
  population_size: 20
  generations: 15
  elite_count: 2
  survival_rate: 0.6
  mutation_rate: 0.2
  min_mutation_rate: 0.05
  max_mutation_rate: 0.5

# LLM scoring configuration for real-time strategy evaluation.
# When configured, the evolution system uses an actual LLM API to score
# candidate strategies instead of the deterministic fallback scorer.
llm:
  api_key: "YOUR_KEY"
  model: "YOUR_MODEL"
  base_url: "YOUR_BASE_URL"
  temperature: 0.3
  max_tokens: 500
  timeout_seconds: 30
