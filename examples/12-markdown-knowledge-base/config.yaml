# Configuration for the structure-aware markdown knowledge base example.
# Layout mirrors the shared five-section structure: database / embedding /
# llm / memory / knowledge.

database:
  host: 127.0.0.1
  port: 5433
  user: postgres
  password: postgres
  database: goagent
  sslmode: disable

embedding:
  service_url: http://localhost:8000
  model: qwen3-embedding:0.6b
  # Must equal the storage table's VECTOR(1024) dimension.
  dimensions: 1024
  timeout: 30

llm:
  # Leave provider/model empty to run in retrieval-only mode (no generation).
  provider: ollama
  api_key: ""
  base_url: http://localhost:11434
  model: llama3.2:latest
  timeout: 120
  max_tokens: 2048

# Reserved for config-structure compatibility with the other knowledge
# examples; this focused example does not maintain conversational memory.
memory:
  enabled: false
  max_history: 10
  max_sessions: 100
  enable_distillation: false
  distillation_threshold: 3

knowledge:
  # Section-first chunking: a section is split only when it exceeds chunk_size,
  # and never inside a code block or table.
  chunk_size: 1500
  chunk_overlap: 120
  top_k: 6
  min_score: 0.35
  passage_prefix: "passage:"
  query_prefix: "query:"
