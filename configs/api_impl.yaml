# ARES embedded launcher config — internal/api_impl.ServiceConfig
# Used by: `ares start --config configs/api_impl.yaml`
#
# Fill in llm.api_key (or hardcode it) and adjust the mcp servers /
# dashboard.addr for your environment. StartService verifies LLM reachability
# on boot, so a bad api_key fails fast with a clear error.

llm:
  provider: "openai"
  model: "sensenova-6.7-flash-lite"
  base_url: "https://token.sensenova.cn/v1"
  api_key: "REPLACE_WITH_YOUR_API_KEY"
  timeout: 120
  max_prompt_length: 8192

mcp:
  servers:
    - name: codegraph
      transport:
        stdio:
          command: codegraph
          args: ["serve", "--mcp"]
    - name: codebase-memory
      transport:
        stdio:
          command: codebase-memory-mcp
          args: []

dashboard:
  addr: ":9092"

# Optional PostgreSQL-backed evaluation service.
# When `enabled: true`, StartService wires the eval HTTP endpoints under
# /api/v1/eval/* (run / results / leaderboard / comparison) and mounts them
# on the dashboard. Leave disabled (default) to skip eval — memory and
# retrieval services still work via their in-memory backends.
# postgres:
#   enabled: false
#   host: "localhost"
#   port: 5432
#   user: "postgres"
#   password: ""
#   database: "ARES"
#   ssl_mode: "require"
