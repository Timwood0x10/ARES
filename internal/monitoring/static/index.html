<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARES Console</title>
<link rel="stylesheet" href="/console/static/style.css">
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-glyph">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#g1)" opacity="0.9"/>
            <path d="M2 17l10 5 10-5" stroke="url(#g2)" stroke-width="2" fill="none" opacity="0.6"/>
            <path d="M2 12l10 5 10-5" stroke="url(#g2)" stroke-width="2" fill="none" opacity="0.8"/>
            <defs><linearGradient id="g1" x1="2" y1="2" x2="22" y2="12"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#6366f1"/></linearGradient><linearGradient id="g2" x1="2" y1="12" x2="22" y2="22"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs>
          </svg>
        </div>
        <span class="logo-text">ARES</span>
        <span class="logo-sub">CONSOLE</span>
      </div>
    </div>
    <div id="cost-summary" class="topbar-center"></div>
    <div class="topbar-right">
      <div id="live-indicator" class="live-dot"></div>
      <span class="live-text">LIVE</span>
    </div>
  </header>

  <!-- Metrics Strip -->
  <div id="metrics-strip" class="metrics-strip"></div>

  <!-- Cost Bar -->
  <div id="cost-bar-wrap" class="cost-bar-wrap"></div>

  <!-- Main Content -->
  <div class="main">
    <!-- DAG Panel -->
    <section class="dag-panel">
      <div class="panel-header">
        <div class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/></svg>
          Agent Topology
        </div>
        <span id="dag-stats" class="panel-stats"></span>
      </div>
      <div class="dag-canvas">
        <svg id="dag"></svg>
      </div>
      <div id="dag-tooltip" class="dag-tooltip"></div>
    </section>

    <!-- Side Panel -->
    <section class="side-panel">
      <div class="side-header">
        <span class="side-title">Agents</span>
        <span id="agent-count" class="agent-count"></span>
      </div>
      <div id="agent-grid" class="agent-grid"></div>
      <div class="side-header" style="border-top:1px solid var(--border)">
        <span class="side-title">Activity</span>
      </div>
      <div id="event-log" class="event-log"></div>
    </section>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <div class="tab-bar-inner">
      <button class="tab active" data-tab="events">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Events
      </button>
      <button class="tab" data-tab="workflow">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="10" y1="6.5" x2="14" y2="6.5"/><line x1="6.5" y1="10" x2="6.5" y2="14"/></svg>
        Workflow
      </button>
      <button class="tab" data-tab="mcp">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        MCP
      </button>
      <button class="tab" data-tab="llm">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        LLM
      </button>
      <button class="tab" data-tab="memory">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        Memory
      </button>
      <button class="tab" data-tab="evolution">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        Evolution
      </button>
      <button class="tab" data-tab="arena">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Arena
      </button>
    </div>
  </nav>

  <!-- Tab Content -->
  <section id="tab-content" class="tab-content"></section>

  <!-- Detail Panel (slide-in) -->
  <aside id="detail-panel" class="detail-panel">
    <div class="detail-header">
      <div class="detail-header-left">
        <div id="detail-dot" class="detail-dot"></div>
        <span id="detail-title" class="detail-title">Agent Detail</span>
      </div>
      <button id="detail-close" class="detail-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="detail-body" class="detail-body"></div>
  </aside>

  <!-- Overlay -->
  <div id="detail-overlay" class="detail-overlay"></div>
</div>
<script src="/console/static/app.js"></script>
</body>
</html>
